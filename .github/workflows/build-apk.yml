name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug and release APKs
        run: gradle --no-daemon clean assembleDebug assembleRelease --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/RL-Zone-Finder-debug.apk
          cp app/build/outputs/apk/release/app-release.apk output/RL-Zone-Finder-release.apk

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: rl-zone-finder-apks
          path: output/*.apk
