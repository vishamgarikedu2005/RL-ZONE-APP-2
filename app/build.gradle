plugins {
    id 'com.android.application'
}

android {
    namespace 'com.reylenferna.tariffzone'
    compileSdk 35

    defaultConfig {
        applicationId 'com.reylenferna.tariffzone'
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName '1.1'
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
}
